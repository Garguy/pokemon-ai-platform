spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pokemonai
    username: pokemonai
    password: pokemonai
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
