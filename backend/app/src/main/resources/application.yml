spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/pokemonai
    username: pokemonai
    password: pokemonai
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.6
          max-tokens: 2048

pokeapi:
  base-url: https://pokeapi.co

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
