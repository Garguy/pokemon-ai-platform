spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pokemonai
    username: pokemonai
    password: pokemonai
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          model: gemini-2.0-flash
          temperature: 0.2
          max-output-tokens: 256

pokeapi:
  base-url: https://pokeapi.co

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
